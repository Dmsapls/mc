<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You — MC.FMPT.NET</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:Inter, sans-serif;
      background: linear-gradient(180deg, #0b182d, #101b2d);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:700px;
      border:6px solid #000;
      background:#162439;
      box-shadow:0 10px 0 rgba(0,0,0,.3);
      padding:24px;
    }

    h1{
      font-family:"Press Start 2P", monospace;
      font-size:18px;
      color:#fff1b7;
      margin-bottom:20px;
      text-align:center;
    }

    .msg{
      font-size:16px;
      line-height:1.7;
      text-align:center;
      margin-bottom:20px;
    }

    .card{
      border:4px solid #000;
      background:#1f2f4a;
      padding:16px;
      margin-top:10px;
    }

    .row{
      margin:8px 0;
      font-size:14px;
      line-height:1.6;
    }

    .label{
      font-weight:800;
      color:#bff58d;
      text-transform:uppercase;
      font-size:12px;
    }

    .ip{
      margin-top:16px;
      padding:12px;
      border:4px solid #000;
      background:#4f8f34;
      color:#0e2508;
      font-weight:900;
      text-align:center;
    }

    a{
      display:block;
      margin-top:20px;
      text-align:center;
      color:#fff1b7;
      text-decoration:none;
      font-weight:800;
    }

    a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>THANK YOU 🎮</h1>

    <div class="msg">
      Your vote has been recorded for <b>MC.FMPT.NET</b>.<br>
      If we reach <b>50 submissions</b>, the server will launch.
    </div>

    <div class="card" id="dataBox">
      <div class="row"><span class="label">Loading submission data...</span></div>
    </div>

    <a href="https://mc.fmpt.net">← Back to home</a>
    <a href="https://fmpt.net" style="color:#fcba03;">← Go to FMPT Student Hub</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const data = {
      "Form": params.get("form_name"),
      "Email": params.get("email"),
      "Minecraft Name": params.get("minecraft_name"),
      "Account Type": params.get("account_type"),
      "Version": params.get("server_version"),
      "Server IP": params.get("planned_server_ip")
    };

    const box = document.getElementById("dataBox");
    box.innerHTML = "";

    Object.entries(data).forEach(([key, value]) => {
      const div = document.createElement("div");
      div.className = "row";
      div.innerHTML = `<span class="label">${key}</span><br>${value || "N/A"}`;
      box.appendChild(div);
    });
  </script>

</body>
</html>
