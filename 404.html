<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — MC.FMPT.NET</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --grass:#5dbb63;
    --dirt:#8b5a2b;
    --stone:#3c3c3c;
    --gold:#FFD36B;
    --text:#ffffff;
  }

  *{margin:0;padding:0;box-sizing:border-box}

  body{
    font-family:Inter, sans-serif;
    color:var(--text);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      repeating-linear-gradient(
        0deg,
        #1a1a1a 0px,
        #1a1a1a 40px,
        #111 40px,
        #111 80px
      );
  }

  .box{
    text-align:center;
    padding:30px;
    border:4px solid #000;
    background:
      linear-gradient(#5dbb63 0 25%, #8b5a2b 25% 100%);
    box-shadow:0 0 0 4px #000, 0 12px 0 #000;
    max-width:420px;
  }

  h1{
    font-family:'Press Start 2P', monospace;
    font-size:38px;
    margin-bottom:20px;
  }

  .title{
    font-family:'Press Start 2P', monospace;
    font-size:14px;
    margin-bottom:18px;
    color:#fff;
  }

  p{
    font-size:13px;
    line-height:1.6;
    margin-bottom:22px;
    color:#f0f0f0;
  }

  .btn{
    display:inline-block;
    padding:12px 18px;
    background:var(--gold);
    color:#3b2a00;
    text-decoration:none;
    font-weight:700;
    border:3px solid #000;
    box-shadow:0 4px 0 #000;
    transition:.1s;
  }

  .btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 0 #000;
  }

  .btn:active{
    transform:translateY(2px);
    box-shadow:0 2px 0 #000;
  }

  .hint{
    margin-top:18px;
    font-size:11px;
    opacity:.8;
  }

</style>
</head>

<body>

<div class="box">
  <h1>404</h1>

  <div class="title">PAGE NOT FOUND</div>

  <p>
    Cette zone n’est pas encore générée... 🧱<br><br>
    Le serveur MC.FMPT.NET est encore en préparation.<br>
    Nous construisons le monde petit à petit — cela prend du temps.
  </p>

  <a href="/" class="btn">⬅ Retour au Hub</a>

  <div class="hint">
    💡 Astuce : certaines pages arriveront bientôt, restez connectés.
  </div>
</div>

</body>
</html>
